<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры Эми</title>
    <link rel="icon" type="image/png" sizes="180x180" href="/favicon.ico">
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="container">
        <h1>Игры</h1>
        <div class="syllable-cards" style="display: block;">
            <a href="syllable.html" style="display: block; text-decoration: none;" div class="card">Слоги</a>
            <a href="colors.html" style="display: block; text-decoration: none;" div class="card">Цвета</a>
            <a href="figures.html" style="display: block; text-decoration: none;" div class="card">Фигуры</a>
            <a href="colored-figures.html" style="display: block; text-decoration: none;" class="card">Цветные фигуры</a>
            <a href="counting.html" style="display: block; text-decoration: none;" div class="card">Счет</a>
        </div>
    </div>
    <script type="text/javascript">
        if ("serviceWorker" in navigator) {
          window.addEventListener("load", () => {
            navigator.serviceWorker.register("/service-worker.js").then(
              (registration) => {
                console.log("Service Worker registered with scope:", registration.scope);
              },
              (error) => {
                console.log("Service Worker registration failed:", error);
              }
            );
          });
        }
    </script>
</body>
</html>
